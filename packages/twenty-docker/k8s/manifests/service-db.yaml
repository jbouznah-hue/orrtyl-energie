apiVersion: v1
kind: Service
metadata:
  name: orrtyl-crm-db
  namespace: orrtyl-crm
spec:
  internalTrafficPolicy: Cluster
  ports:
    - port: 5432
      protocol: TCP
      targetPort: 5432
  selector:
    app: orrtyl-crm-db
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  type: ClusterIP
