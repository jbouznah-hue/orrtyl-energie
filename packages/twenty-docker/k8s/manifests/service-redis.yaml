apiVersion: v1
kind: Service
metadata:
  name: orrtyl-crm-redis
  namespace: orrtyl-crm
spec:
  internalTrafficPolicy: Cluster
  ports:
    - port: 6379
      protocol: TCP
      targetPort: 6379
  selector:
    app: orrtyl-crm-redis
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  type: ClusterIP
